<VirtualHost *:80>
    ServerName misp.gru.com.br
    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^/(.*)$ https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName misp.gru.com.br

    # Certificado do Apache (frontend)
    SSLEngine on
    SSLCertificateFile      /etc/ssl/certs/STAR_gru_com_br.crt
    SSLCertificateKeyFile   /etc/ssl/private/wildcard_gru.key
    SSLCertificateChainFile /etc/ssl/certs/Sectigo_RSA_Domain_Validation.crt

    # Segurança SSL (mantive as suas recomendações, pode ajustar conforme política interna)
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder on
    SSLCompression off
    SSLSessionTickets off

    # Cabeçalhos de segurança
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options nosniff
    Header always set X-XSS-Protection "1; mode=block"

    # Proxy
    ProxyPreserveHost On
    ProxyRequests Off
    SSLProxyEngine On

    ProxyPass        / https://192.168.0.93/
    ProxyPassReverse / https://192.168.0.93/

    # Restrição de IP
   # <Location />
   #     Require ip 201.95.31.236
   # </Location>

    # Logs
    ErrorLog  logs/misp_error.log
    CustomLog logs/misp_access.log combined
</VirtualHost>

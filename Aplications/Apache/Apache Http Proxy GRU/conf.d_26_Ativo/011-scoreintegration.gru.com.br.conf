#Listen 84

<VirtualHost *:80>
    ServerName scoreintegration.gru.com.br

#    <Location />
#        <RequireAll>
#            Require all granted
#        </RequireAll>
#    </Location>

    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass        / http://172.31.49.88:84/
    ProxyPassReverse / http://172.31.49.88:84/

    ErrorLog  logs/scoreintegration_error.log
    CustomLog logs/scoreintegration_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName scoreintegration.gru.com.br
    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass        / http://172.31.49.88:84/
    ProxyPassReverse / http://172.31.49.88:84/

    ErrorLog  logs/scoreintegration_error.log
    CustomLog logs/scoreintegration_access.log combined


    # Certificado
    SSLEngine on
    SSLCertificateFile   /etc/ssl/certs/STAR_gru_com_br.crt
    SSLCertificateKeyFile /etc/ssl/private/wildcard_gru.key
    SSLCertificateChainFile /etc/ssl/certs/Sectigo_RSA_Domain_Validation.crt

</VirtualHost>

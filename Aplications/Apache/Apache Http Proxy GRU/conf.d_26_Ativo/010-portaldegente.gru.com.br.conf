<VirtualHost *:80>
    ServerName portaldegente.gru.com.br
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^/(.*)$ https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName portaldegente.gru.com.br
    ServerAdmin servers.managers@gru.com.br

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

        RequestHeader unset Accept-Encoding
AllowEncodedSlashes NoDecode

    ProxyRequests Off
    ProxyPreserveHost On

    <Proxy "balancer://portaldegente_cluster">
        BalancerMember "http://172.31.49.117/"
        ProxySet lbmethod=byrequests
        Require all granted
    </Proxy>

    ProxyPass "/" "balancer://portaldegente_cluster/" nocanon
    ProxyPassReverse "/" "balancer://portaldegente_cluster/"

        <LocationMatch "\.asp$" >
                AddDefaultCharset ISO-8859-1
        </LocationMatch>

    SSLEngine on
    SSLProtocol TLSv1.2 TLSv1.3
    SSLCipherSuite EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH
    SSLProxyEngine on
    SSLProxyProtocol TLSv1.2 TLSv1.3

    SSLCertificateFile      /etc/ssl/certs/STAR_gru_com_br.crt
    SSLCertificateKeyFile   /etc/ssl/private/wildcard_gru.key
    SSLCertificateChainFile /etc/ssl/certs/Sectigo_RSA_Domain_Validation.crt



    # Configuração de transparência de encoding crucial
    ProxyPass "/" "balancer://portaldegente_cluster/" nocanon
    ProxyPassReverse "/" "balancer://portaldegente_cluster/"

    SSLEngine on
    SSLProtocol TLSv1.2 TLSv1.3
    SSLCipherSuite EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH
    SSLProxyEngine on
    SSLProxyProtocol TLSv1.2 TLSv1.3

    SSLCertificateFile /etc/ssl/certs/STAR_gru_com_br.crt
    SSLCertificateKeyFile /etc/ssl/private/wildcard_gru.key
    SSLCertificateChainFile /etc/ssl/certs/Sectigo_RSA_Domain_Validation.crt

</VirtualHost>


<VirtualHost *:80>
    ServerName meuacesso.gru.com.br
    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^/(.*)$ https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName meuacesso.gru.com.br

    # Certificado do Apache (frontend)
    SSLEngine on
    SSLCertificateFile      /etc/ssl/certs/STAR_gru_com_br.crt
    SSLCertificateKeyFile   /etc/ssl/private/wildcard_gru.key
    SSLCertificateChainFile /etc/ssl/certs/Sectigo_RSA_Domain_Validation.crt

    DocumentRoot /var/www/html/meuacesso
     <Directory /var/www/html/meuacesso>
        Require all granted
     </Directory>
</VirtualHost>


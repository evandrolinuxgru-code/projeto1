<VirtualHost *:80>

    ServerName portaldegente.gru.com.br
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^/(.*)$ https://%{SERVER_NAME}/$1 [R=301,L]
	
</VirtualHost>

<VirtualHost *:443>

    ServerName portaldegente.gru.com.br
	
    # SSL
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/wildcard.gru.com.br.cert.pem
    SSLCertificateKeyFile /etc/ssl/certs/wildcard.gru.com.br.key.pem
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite PROFILE=SYSTEM
    SSLHonorCipherOrder on
    SSLSessionTickets off
    SSLCompression off
	
    # Segurança
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    RequestHeader unset Accept-Encoding
    AllowEncodedSlashes NoDecode
	
    # Proxy
    ProxyRequests Off
    ProxyPreserveHost On
	
    <Proxy "balancer://portaldegente_cluster">
	
        BalancerMember "http://172.31.49.117/"
        ProxySet lbmethod=byrequests
        Require all granted
		
    </Proxy>
	
    ProxyPass "/" "balancer://portaldegente_cluster/" nocanon
    ProxyPassReverse "/" "balancer://portaldegente_cluster/"
	
    <LocationMatch "\.asp$">
        AddDefaultCharset ISO-8859-1
    </LocationMatch>
	
</VirtualHost>


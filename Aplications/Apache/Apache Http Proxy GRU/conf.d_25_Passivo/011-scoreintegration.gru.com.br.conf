<VirtualHost *:80>

    ServerName scoreintegration.gru.com.br
	
    # Proxy
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://172.31.49.88:84/
    ProxyPassReverse / http://172.31.49.88:84/
	
    # Logs
    ErrorLog logs/scoreintegration_error.log
    CustomLog logs/scoreintegration_access.log combined
	
</VirtualHost>

<VirtualHost *:443>

    ServerName scoreintegration.gru.com.br
	
    # SSL
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/wildcard.gru.com.br.cert.pem
    SSLCertificateKeyFile /etc/ssl/certs/wildcard.gru.com.br.key.pem
	
    # Proxy
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://172.31.49.88:84/
    ProxyPassReverse / http://172.31.49.88:84/
	
    # Logs
    ErrorLog logs/scoreintegration_error.log
    CustomLog logs/scoreintegration_access.log combined
	
</VirtualHost>


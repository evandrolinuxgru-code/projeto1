<VirtualHost *:80>

    ServerName portalfaturamento.gru.com.br
    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^/(.*)$ https://%{SERVER_NAME}/$1 [R=301,L]
	
</VirtualHost>

<VirtualHost *:443>

    ServerName portalfaturamento.gru.com.br

    # SSL
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/wildcard.gru.com.br.cert.pem
    SSLCertificateKeyFile /etc/ssl/certs/wildcard.gru.com.br.key.pem
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite PROFILE=SYSTEM
    SSLHonorCipherOrder on
    SSLSessionTickets off
    SSLCompression off
	
    # Segurança
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options nosniff

    # Proxy
    ProxyRequests Off
    ProxyPreserveHost On

    <Proxy balancer://portalfaturamento_cluster>
	
        BalancerMember http://172.31.49.155:8000/
        ProxySet lbmethod=byrequests timeout=120
		Require all granted
				
    </Proxy>

    ProxyPass / balancer://portalfaturamento_cluster/ nocanon
    ProxyPassReverse / balancer://portalfaturamento_cluster/

    Timeout 300
    ProxyTimeout 300
    AllowEncodedSlashes On

    # Logs
    ErrorLog logs/portalfaturamento_error.log
    CustomLog logs/portalfaturamento_access.log combined

</VirtualHost>

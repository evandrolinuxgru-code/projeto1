<VirtualHost *:80>

    ServerName portaldocandidato.gru.com.br
    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^/(.*)$ https://%{SERVER_NAME}/$1 [R=301,L]
	
</VirtualHost>

<VirtualHost *:443>

    ServerName portaldocandidato.gru.com.br
	
    # SSL
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/wildcard.gru.com.br.cert.pem
    SSLCertificateKeyFile /etc/ssl/certs/wildcard.gru.com.br.key.pem
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite PROFILE=SYSTEM
    SSLHonorCipherOrder on
    SSLSessionTickets off
    SSLCompression off

    # Segurança
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options nosniff

    # Proxy
    <Proxy balancer://portaldocandidato_cluster>
	
        BalancerMember http://172.31.49.117/
        ProxySet lbmethod=byrequests
		Require all granted
				
    </Proxy>

    ProxyPass / balancer://portaldocandidato_cluster/
    ProxyPassReverse / balancer://portaldocandidato_cluster/
    
    # Logs
    ErrorLog logs/portaldocandidato_error.log
    CustomLog logs/portaldocandidato_access.log combined

</VirtualHost>


<VirtualHost *:80>

    ServerName dashboard.gru.com.br
    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^/(.*)$ https://%{SERVER_NAME}/$1 [R=301,L]
	
</VirtualHost>

<VirtualHost *:443>

    ServerName dashboard.gru.com.br
	
    # SSL
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/wildcard.gru.com.br.cert.pem
    SSLCertificateKeyFile /etc/ssl/certs/wildcard.gru.com.br.key.pem
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite PROFILE=SYSTEM
    SSLHonorCipherOrder on
    SSLSessionTickets off
    SSLCompression off
	
    # Segurança
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options nosniff
	
    # Proxy
    <Proxy balancer://dashboard_cluster>
	
        BalancerMember http://172.31.49.227/DASHBOARD/
        ProxySet lbmethod=byrequests
		Require all granted
				
    </Proxy>
	
    ProxyPass / balancer://dashboard_cluster/
    ProxyPassReverse / balancer://dashboard_cluster/
	
    # Logs
    ErrorLog logs/dashboard_error.log
    CustomLog logs/dashboard_access.log combined
	
</VirtualHost>


<VirtualHost *:80>

    ServerName minhaconta.gru.com.br
    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^/(.*)$ https://%{SERVER_NAME}/$1 [R=301,L]
	
</VirtualHost>

<VirtualHost *:443>

    ServerName minhaconta.gru.com.br
	
    # SSL
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/wildcard.gru.com.br.cert.pem
    SSLCertificateKeyFile /etc/ssl/certs/wildcard.gru.com.br.key.pem
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite PROFILE=SYSTEM
    SSLHonorCipherOrder on
    SSLSessionTickets off
    SSLCompression off
	
    # Segurança
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options nosniff
	
    # Proxy
    ProxyPreserveHost On
    ProxyRequests Off
    SSLProxyEngine On
    ProxyPass / https://sprdapadsgru01.gru.com.br:9251/
    ProxyPassReverse / https://sprdapadsgru01.gru.com.br:9251/
	
    # Logs
    ErrorLog logs/minhaconta_error.log
    CustomLog logs/minhaconta_access.log combined
	
</VirtualHost>


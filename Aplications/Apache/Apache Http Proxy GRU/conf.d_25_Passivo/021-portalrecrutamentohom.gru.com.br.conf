<VirtualHost *:80>

    ServerName portalrecrutamentohomhom.gru.com.br
    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^/(.*)$ https://%{SERVER_NAME}/$1 [R=301,L]
	
</VirtualHost>

<VirtualHost *:443>

    ServerName portalrecrutamentohom.gru.com.br

    # SSL
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/wildcard.gru.com.br.cert.pem
    SSLCertificateKeyFile /etc/ssl/certs/wildcard.gru.com.br.key.pem
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite PROFILE=SYSTEM
    SSLHonorCipherOrder on
    SSLSessionTickets off
    SSLCompression off
	
    # Segurança
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options nosniff

    RequestHeader unset Accept-Encoding
    AllowEncodedSlashes NoDecode

    # Proxy
    ProxyRequests Off
    ProxyPreserveHost On

    <Proxy "balancer://portalrecrutamentohom_cluster">
	
        BalancerMember "http://172.31.49.118/"
        ProxySet lbmethod=byrequests
		Require all granted
				
    </Proxy>

    ProxyPass "/" "balancer://portalrecrutamentohom_cluster/" nocanon
    ProxyPassReverse "/" "balancer://portalrecrutamentohom_cluster/"

    # Logs
    ErrorLog logs/portalrecrutamentohom_error.log
    CustomLog logs/portalrecrutamentohom_access.log combined
</VirtualHost>


<VirtualHost *:80>
    ServerName misp.gru.com.br
    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^/(.*)$ https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName misp.gru.com.br

    # Certificado do Apache (frontend)
    SSLEngine on
    SSLCertificateFile      /etc/ssl/certs/wildcard.gru.com.br.cert.pem
    SSLCertificateKeyFile   /etc/ssl/certs/wildcard.gru.com.br.key.pem

    # Segurança SSL (mantive as suas recomendações, pode ajustar conforme política interna)
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder on
    SSLCompression off
    SSLSessionTickets off

    # Cabeçalhos de segurança
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options nosniff

    # Proxy
    ProxyPreserveHost On
    ProxyRequests Off
    SSLProxyEngine On

    ProxyPass        / https://192.168.0.93/
    ProxyPassReverse / https://192.168.0.93/

   # Restrição de IP
   # <Location />
   #     Require ip 201.95.31.236
   # </Location>

    # Logs
    ErrorLog  logs/misp_error.log
    CustomLog logs/misp_access.log combined
</VirtualHost>

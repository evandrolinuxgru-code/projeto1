server {
    listen 80;
    server_name fmscmsplus.gru.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name fmscmsplus.gru.com.br;

    ssl_certificate      /data/cms-plus/nginx/gru_wildcard_cert.crt;
    ssl_certificate_key  /data/cms-plus/nginx/gru_wildcard_key.key;
    ssl_session_cache    shared:SSL:1m;
    ssl_session_timeout  10m;
    ssl_ciphers          PROFILE=SYSTEM;
    ssl_prefer_server_ciphers on;

    location / {
		# Regras de acesso - Bloqueado na internet
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;

        proxy_pass              http://cms-plus-prod-fms;
        proxy_http_version      1.1;
        proxy_set_header        Host               $host;
        proxy_set_header        X-Real-IP          $remote_addr;
        proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto  $scheme;
        proxy_set_header        X-Forwarded-Port   $server_port;
        proxy_max_temp_file_size 0;
    }
}

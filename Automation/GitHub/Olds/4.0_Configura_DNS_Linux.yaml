---
- name: Configurar DNS apenas para redes autorizadas
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    dns_config:
      "172.31.49": ["172.31.50.23", "172.31.50.27"]
      "172.31.50": ["172.31.50.23", "172.31.50.27"]
      "10.36.52":  ["10.36.52.24", "172.31.52.24"]
      "172.31.52": ["172.31.52.24", "10.36.52.24"]

  tasks:
    - name: Obter prefixo da rede principal
      set_fact:
        rede_base: "{{ ansible_default_ipv4.address.split('.')[:3] | join('.') }}"

    - name: Verificar se rede está autorizada
      set_fact:
        dns_servers: "{{ dns_config[rede_base] }}"
      when: rede_base in dns_config

    - name: Verificar se /etc/resolv.conf é link simbólico
      stat:
        path: /etc/resolv.conf
      register: resolv_stat
      when: dns_servers is defined

    - name: Remover symlink de /etc/resolv.conf se existir
      file:
        path: /etc/resolv.conf
        state: absent
      when: dns_servers is defined and resolv_stat.stat.islnk is defined and resolv_stat.stat.islnk

    - name: Criar novo /etc/resolv.conf com DNS apropriado
      copy:
        dest: /etc/resolv.conf
        content: |
          search gru.local
          nameserver {{ dns_servers[0] }}
          nameserver {{ dns_servers[1] }}
        owner: root
        group: root
        mode: '0644'
      when: dns_servers is defined
  ignore_errors: yes
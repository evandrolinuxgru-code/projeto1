---
- name: Apply Windows updates without rebooting
  hosts: all
  gather_facts: yes
  any_errors_fatal: false

  vars:
    update_categories:
      - "DefinitionUpdates"
      - "SecurityUpdates"
      - "CriticalUpdates"
      - "UpdateRollups"
      - "Updates"

    reboot_preference: never
    max_update_attempts: 3
    update_timeout: 3600
    report_dir: "C:\\Windows\\UpdateReports"
    report_retention_days: 30

  tasks:
    - name: Validate Windows Server connectivity
      win_ping:
      tags: always

    - name: Ensure update report directory exists
      win_file:
        path: "{{ report_dir }}"
        state: directory
      tags: reporting

    - name: Cleanup old reports (older than {{ report_retention_days }} days)
      win_find:
        paths: "{{ report_dir }}"
        patterns: "*.txt"
        age: "{{ report_retention_days }}d"
        age_stamp: ctime
      register: old_reports
      when: report_retention_days > 0
      tags: reporting

    - name: Remove old reports
      win_file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_reports.files | default([]) }}"
      when: old_reports.matched | default(0) > 0
      tags: reporting

    - name: Get last boot time using PowerShell
      win_shell: |
        (Get-CimInstance -ClassName win32_operatingsystem).LastBootUpTime
      register: last_boot
      tags: prechecks

    - name: Display last boot time
      debug:
        msg: "Last boot time: {{ last_boot.stdout }}"
      tags: prechecks

    - name: Get current list of pending updates
      win_updates:
        category_names: "{{ update_categories }}"
        state: searched
        reboot: no
        log_path: "{{ report_dir }}\\{{ inventory_hostname }}_update_search.log"
      register: win_updates_result
      retries: "{{ max_update_attempts }}"
      until: win_updates_result is succeeded
      delay: 30
      tags: prechecks

    - name: Display pending updates summary
      debug:
        msg: |
          Pending updates found: {{ win_updates_result.updates | length }}
          Security updates: {{ win_updates_result.updates | selectattr('categories', 'contains', 'Security Updates') | list | length }}
          Critical updates: {{ win_updates_result.updates | selectattr('categories', 'contains', 'Critical Updates') | list | length }}
      tags: prechecks

    - block:
        - name: Install updates without reboot (attempt 1 of {{ max_update_attempts }})
          win_updates:
            category_names: "{{ update_categories }}"
            state: installed
            reboot: "{{ reboot_preference }}"
            log_path: "{{ report_dir }}\\{{ inventory_hostname }}_update_install.log"
            timeout: "{{ update_timeout }}"
          register: update_task
          retries: "{{ max_update_attempts }}"
          until: update_task is succeeded
          delay: 60
          tags: updates

        - name: Verify updates installed successfully
          debug:
            msg: |
              Successfully installed {{ update_task.found_update_count }} updates
              Failed updates: {{ update_task.failed_update_count }}
              Reboot required: {{ update_task.reboot_required | default('false') }}
          tags: verification

      rescue:
        - name: Handle update installation failure
          win_shell: |
            Write-Output "Failed to install updates on {{ ansible_date_time.iso8601 }}"
            Get-WindowsUpdateLog -LogPath "{{ report_dir }}\\{{ inventory_hostname }}_update_failure.log"
          args:
            executable: powershell
          tags: errors

        - name: Notify about update failure
          debug:
            msg: "Failed to install updates on {{ inventory_hostname }}. Check logs in {{ report_dir }}"
          tags: errors

    - name: Generate update report
      copy:
        content: |
          Hostname: {{ inventory_hostname }}
          Date: {{ ansible_date_time.iso8601 }}
          Updates Installed: {{ update_task.found_update_count | default(0) }}
          Failed Updates: {{ update_task.failed_update_count | default(0) }}
          Reboot Required: {{ update_task.reboot_required | default(false) }}
        dest: "{{ report_dir }}\\{{ inventory_hostname }}_updates_{{ ansible_date_time.date }}.txt"
      tags: reporting

    - name: List updates that require reboot (for manual handling)
      debug:
        msg: |
          Updates requiring reboot ({{ win_updates_result.updates | selectattr('reboot_required', 'equalto', true) | list | length }}):
          {{ win_updates_result.updates | selectattr('reboot_required', 'equalto', true) | map(attribute='title') | list | to_nice_yaml }}
      when: win_updates_result.updates | selectattr('reboot_required', 'equalto', true) | list | length > 0
      tags: reporting
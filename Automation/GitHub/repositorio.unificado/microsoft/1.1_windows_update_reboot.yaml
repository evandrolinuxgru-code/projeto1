---
- name: Atualizações Windows com reboot e controle em lote
  hosts: all
  gather_facts: yes

  vars:
    reboot_preference: "{{ reboot_required | default('no') }}"
    report_dir: "C:\\Windows\\UpdateReports"

  tasks:

    - name: Testar conectividade com o host
      win_ping:
      tags: always

    - name: Remover configuração de WSUS herdada
      win_regedit:
        path: HKLM:\Software\Policies\Microsoft\Windows\WindowsUpdate
        state: absent
      tags: cleanup

    - name: Garantir diretório de relatórios
      win_file:
        path: "{{ report_dir }}"
        state: directory
      tags: setup

    - name: Verificar atualizações disponíveis
      win_updates:
        state: searched
        reboot: no
        log_path: "{{ report_dir }}\\{{ inventory_hostname }}_search.log"
      register: updates_available
      retries: 3
      delay: 30
      until: updates_available is succeeded
      ignore_errors: yes
      tags: check

    - block:

        - name: Aplicar atualizações
          win_updates:
            state: installed
            reboot: "{{ reboot_preference }}"
            log_path: "{{ report_dir }}\\{{ inventory_hostname }}_install.log"
          register: update_result
          retries: 3
          delay: 60
          until: update_result is succeeded
          ignore_errors: yes
          tags: install

        - name: Gerar relatório por host
          win_copy:
            content: |
              Host: {{ inventory_hostname }}
              Data: {{ ansible_date_time.iso8601 }}
              Atualizações instaladas: {{ update_result.installed_update_count | default(0) }}
              Falharam: {{ update_result.failed_update_count | default(0) }}
              Reboot necessário: {{ update_result.reboot_required | default(false) | ternary('Sim', 'Não') }}
            dest: "{{ report_dir }}\\{{ inventory_hostname }}_report_{{ ansible_date_time.date }}.txt"
          tags: report

      when:
        - updates_available is defined
        - updates_available.updates | length > 0

      rescue:

        - name: Registrar falha de atualização
          win_shell: |
            $logPath = "{{ report_dir }}\\{{ inventory_hostname }}_update_failure_{{ ansible_date_time.date }}.log"
            Get-WindowsUpdateLog -LogPath $logPath
            "Falha às {{ ansible_date_time.iso8601 }}" | Out-File -Append -FilePath $logPath
          args:
            executable: powershell
          tags: error

        - name: Notificar falha
          debug:
            msg: "Falha ao instalar atualizações no host {{ inventory_hostname }}"
          tags: error

    - name: Reboot se necessário
      win_reboot:
        msg: "Reiniciando servidor após atualizações"
        connect_timeout: 60
        reboot_timeout: 600
        pre_reboot_delay: 30
        post_reboot_delay: 120
      when:
        - update_result is defined
        - update_result.reboot_required | default(false)
      tags: reboot

    - name: Confirmar reboot
      debug:
        msg: "Host {{ inventory_hostname }} reiniciado com sucesso."
      when:
        - update_result is defined
        - update_result.reboot_required | default(false)
      tags: reboot

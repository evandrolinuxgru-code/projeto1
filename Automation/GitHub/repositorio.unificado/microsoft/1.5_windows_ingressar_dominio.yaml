---
- name: Ingressar servidores Windows no domínio gru.local
  hosts: all
  gather_facts: no
  vars:
    domain_name: gru.local
    domain_user: sistemas.gru
    domain_password: MinhaSenha123
    domain_ou: "OU=Servidores,DC=gru,DC=local"
    dns_ip: 172.31.50.23

  tasks:

    - name: Configurar DNS primário
      ansible.windows.win_dns_client:
        adapter_names: '*'
        ipv4_addresses:
          - "{{ dns_ip }}"

    - name: Ingressar no domínio gru.local
      ansible.windows.win_domain_membership:
        dns_domain_name: "{{ domain_name }}"
        domain_admin_user: "{{ domain_user }}"
        domain_admin_password: "{{ domain_password }}"
        domain_ou_path: "{{ domain_ou }}"
        state: domain
      register: domain_join

    - name: Reiniciar servidor se necessário
      ansible.windows.win_reboot:
        msg: "Reiniciando após ingresso no domínio"
        connect_timeout: 60
        reboot_timeout: 600
      when: domain_join.reboot_required

---
- name: Atualização de pacotes em sistemas RHEL e Ubuntu
  hosts: all
  become: yes
  gather_facts: yes

  tasks:
    - name: Atualizar todos os pacotes (RHEL/CentOS 6/7)
      ansible.builtin.yum:
        name: '*'
        state: latest
        update_cache: yes
      when: 
        - ansible_distribution in ["RedHat", "CentOS"]
        - ansible_distribution_major_version in ["6", "7"]
      register: rhel67_update
      ignore_errors: yes

    - name: Exibir erro se falhou (RHEL 6/7)
      debug:
        msg: "{{ rhel67_update.msg }}"
      when: rhel67_update is failed

    - name: Atualizar todos os pacotes (RHEL/CentOS 8/9)
      ansible.builtin.dnf:
        name: '*'
        state: latest
        update_cache: yes
      when:
        - ansible_distribution in ["RedHat", "CentOS"]
        - ansible_distribution_major_version in ["8", "9"]
      register: rhel89_update
      ignore_errors: yes

    - name: Exibir erro se falhou (RHEL 8/9)
      debug:
        msg: "{{ rhel89_update.msg }}"
      when: rhel89_update is failed

    - name: Atualizar todos os pacotes (Ubuntu/Debian)
      ansible.builtin.apt:
        upgrade: dist
        update_cache: yes
        autoremove: yes
      when: ansible_distribution in ["Ubuntu", "Debian"]
      register: debian_update
      ignore_errors: yes

    - name: Exibir erro se falhou (Ubuntu/Debian)
      debug:
        msg: "{{ debian_update.msg }}"
      when: debian_update is failed
